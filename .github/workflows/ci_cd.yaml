name: Titanic ML CI/CD Pipeline

on:

  push:
    branches:
      - main

  pull_request:
    branches:
      - main


jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      # Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v3


      # Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4

        with:
          python-version: "3.10"


      # Upgrade pip
      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip


      # Install dependencies
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest httpx


      # Run tests
      - name: Run Tests
        run: |
          pytest -v


      # Build Docker image
      - name: Build Docker Image
        run: |
          docker build -t titanic-ml-app -f deployment/Dockerfile .
          